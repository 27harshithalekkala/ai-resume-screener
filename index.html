<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resume Screener</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .wrapper { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

    /* ── Header ── */
    header { text-align: center; padding: 2rem 0 3rem; }
    header h1 { font-size: 2.4rem; font-weight: 800; color: #f8fafc; }
    header h1 span { color: #6366f1; }
    header p { color: #94a3b8; margin-top: .5rem; font-size: 1.05rem; }

    /* ── Card ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.2rem; color: #c7d2fe; letter-spacing: .04em; text-transform: uppercase; font-size:.85rem; }

    /* ── Form Controls ── */
    label { display: block; font-size: .9rem; color: #94a3b8; margin-bottom: .5rem; }
    textarea {
      width: 100%; min-height: 160px; padding: .85rem 1rem;
      background: #0f172a; border: 1px solid #475569; border-radius: 10px;
      color: #e2e8f0; font-size: .95rem; resize: vertical;
      transition: border-color .2s;
    }
    textarea:focus { outline: none; border-color: #6366f1; }

    /* ── File Drop Zone ── */
    .drop-zone {
      border: 2px dashed #475569; border-radius: 12px;
      padding: 2.5rem 1rem; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #6366f1; background: #1a2540; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: .5rem; }
    .drop-zone p { color: #94a3b8; font-size: .95rem; }
    .drop-zone p span { color: #818cf8; font-weight: 600; }
    #file-list { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: .5rem; }
    .file-chip {
      background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 20px;
      padding: .3rem .8rem; font-size: .8rem; color: #93c5fd;
      display: flex; align-items: center; gap: .4rem;
    }
    .file-chip button { background: none; border: none; color: #f87171; cursor: pointer; font-size: 1rem; line-height: 1; }

    /* ── Submit Button ── */
    .btn-screen {
      width: 100%; padding: 1rem; margin-top: 1.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 1.1rem; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-screen:hover { opacity: .9; }
    .btn-screen:active { transform: scale(.98); }
    .btn-screen:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Spinner ── */
    #spinner {
      display: none; text-align: center; padding: 2rem;
      color: #94a3b8; font-size: 1rem;
    }
    .spin {
      display: inline-block; width: 36px; height: 36px;
      border: 4px solid #334155; border-top-color: #6366f1;
      border-radius: 50%; animation: spin .8s linear infinite;
      margin-bottom: .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results { margin-top: 2rem; }
    #results h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 1.5rem; color: #f1f5f9; }

    .candidate-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: 1.5rem; margin-bottom: 1.2rem;
      position: relative; overflow: hidden;
    }
    .candidate-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 4px; height: 100%; background: #6366f1;
    }
    .candidate-card.top::before { background: #22c55e; }
    .candidate-card.error::before { background: #ef4444; }

    .cand-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }
    .cand-name { font-size: 1.15rem; font-weight: 700; color: #f1f5f9; }
    .cand-file { font-size: .8rem; color: #64748b; margin-top: .15rem; }

    /* Score badge */
    .score-badge {
      font-size: 1.5rem; font-weight: 900; padding: .3rem .9rem;
      border-radius: 50px; min-width: 70px; text-align: center;
    }
    .score-high { background: #14532d; color: #4ade80; }
    .score-mid  { background: #713f12; color: #fbbf24; }
    .score-low  { background: #450a0a; color: #f87171; }

    /* Score bar */
    .score-bar-wrap { margin: .75rem 0 1rem; }
    .score-bar-bg { background: #0f172a; border-radius: 999px; height: 8px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 999px; transition: width 1s ease; }

    /* Info grid */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .6rem; margin-bottom: 1rem; }
    .info-item label { font-size: .72rem; color: #64748b; text-transform: uppercase; letter-spacing: .06em; display: block; margin-bottom: .2rem; }
    .info-item span { font-size: .9rem; color: #cbd5e1; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1rem; }
    .tag {
      padding: .25rem .65rem; border-radius: 20px; font-size: .78rem; font-weight: 600;
    }
    .tag-skill { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
    .tag-strength { background: #14532d; color: #86efac; border: 1px solid #22c55e; }
    .tag-gap { background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; }

    .section-label { font-size: .78rem; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .4rem; }

    .match-reason { background: #0f172a; border-left: 3px solid #6366f1; padding: .7rem 1rem; border-radius: 0 8px 8px 0; font-size: .9rem; color: #cbd5e1; margin-top: .5rem; }

    /* Error card */
    .error-msg { color: #f87171; font-size: .95rem; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #ef4444; color: #fff; padding: .75rem 1.5rem;
      border-radius: 8px; font-size: .9rem; display: none; z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── Header ── -->
  <header>
    <h1>🤖 AI <span>Resume Screener</span></h1>
    <p>Upload resumes · paste a job description · let AI rank your candidates</p>
  </header>

  <!-- ── Form ── -->
  <div class="card">
    <h2>📋 Job Description</h2>
    <label for="jd">Paste the full job description below</label>
    <textarea id="jd" placeholder="e.g. We are looking for a Python developer with 3+ years of experience in Flask, REST APIs, and PostgreSQL..."></textarea>
  </div>

  <div class="card">
    <h2>📄 Upload Resumes (PDF)</h2>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="resume-input" accept=".pdf" multiple />
      <div class="icon">📁</div>
      <p>Drag &amp; drop PDFs here or <span>click to browse</span></p>
      <p style="font-size:.8rem;margin-top:.4rem;color:#64748b">Multiple files supported · PDF only · Max 10 MB each</p>
    </div>
    <div id="file-list"></div>
  </div>

  <button class="btn-screen" id="screen-btn" onclick="startScreening()">
    🚀 Screen Resumes with AI
  </button>

  <!-- ── Spinner ── -->
  <div id="spinner">
    <div class="spin"></div>
    <p>Analysing resumes with Claude AI… this may take a moment</p>
  </div>

  <!-- ── Results ── -->
  <div id="results"></div>

</div>

<div id="toast"></div>

<script>
  // ── File management ─────────────────────────────────────────────────────
  let selectedFiles = [];

  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('resume-input');
  const fileList   = document.getElementById('file-list');

  // Drag events
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!f.name.toLowerCase().endsWith('.pdf')) { showToast(`"${f.name}" is not a PDF – skipped.`); return; }
      if (selectedFiles.find(x => x.name === f.name)) return; // no duplicates
      selectedFiles.push(f);
    });
    renderFileList();
  }

  function removeFile(name) {
    selectedFiles = selectedFiles.filter(f => f.name !== name);
    renderFileList();
  }

  function renderFileList() {
    fileList.innerHTML = selectedFiles.map(f => `
      <div class="file-chip">
        📄 ${f.name}
        <button onclick="removeFile('${f.name}')" title="Remove">×</button>
      </div>`).join('');
  }

  // ── Screening ───────────────────────────────────────────────────────────
  async function startScreening() {
    const jd  = document.getElementById('jd').value.trim();
    const btn = document.getElementById('screen-btn');

    if (!jd)               { showToast('Please enter a job description.'); return; }
    if (!selectedFiles.length) { showToast('Please upload at least one PDF resume.'); return; }

    // Build FormData
    const form = new FormData();
    form.append('job_description', jd);
    selectedFiles.forEach(f => form.append('resumes', f));

    // UI: loading state
    btn.disabled = true;
    btn.textContent = '⏳ Analysing…';
    document.getElementById('spinner').style.display = 'block';
    document.getElementById('results').innerHTML = '';

    try {
      const resp = await fetch('/screen', { method: 'POST', body: form });
      const data = await resp.json();

      if (!resp.ok) { showToast(data.error || 'Server error.'); return; }
      renderResults(data);
    } catch (err) {
      showToast('Network error – is the server running?');
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 Screen Resumes with AI';
      document.getElementById('spinner').style.display = 'none';
    }
  }

  // ── Render Results ──────────────────────────────────────────────────────
  function renderResults(results) {
    const container = document.getElementById('results');
    if (!results.length) { container.innerHTML = '<p style="color:#94a3b8">No results.</p>'; return; }

    let html = `<h2>🏆 Results  <span style="font-size:.9rem;color:#64748b;font-weight:400">(${results.length} candidate${results.length !== 1 ? 's' : ''}, best match first)</span></h2>`;

    results.forEach((r, i) => {
      if (r.error) {
        html += `
          <div class="candidate-card error">
            <div class="cand-header">
              <div><div class="cand-name">⚠️ ${r.filename}</div></div>
            </div>
            <p class="error-msg">${r.error}</p>
          </div>`;
        return;
      }

      const score      = r.match_score ?? 0;
      const scoreClass = score >= 70 ? 'score-high' : score >= 40 ? 'score-mid' : 'score-low';
      const barColor   = score >= 70 ? '#22c55e'    : score >= 40 ? '#f59e0b'   : '#ef4444';
      const topClass   = i === 0 ? ' top' : '';

      const skillTags    = (r.skills    || []).map(s => `<span class="tag tag-skill">${s}</span>`).join('');
      const strengthTags = (r.strengths || []).map(s => `<span class="tag tag-strength">✅ ${s}</span>`).join('');
      const gapTags      = (r.gaps      || []).map(g => `<span class="tag tag-gap">⚠️ ${g}</span>`).join('');

      html += `
        <div class="candidate-card${topClass}">
          ${i === 0 ? '<div style="position:absolute;top:1rem;right:1rem;font-size:.78rem;background:#14532d;color:#4ade80;padding:.2rem .6rem;border-radius:20px;font-weight:700;">🏆 TOP MATCH</div>' : ''}
          <div class="cand-header">
            <div>
              <div class="cand-name">${r.candidate_name || 'Unknown Candidate'}</div>
              <div class="cand-file">${r.filename}</div>
            </div>
            <div class="score-badge ${scoreClass}">${score}%</div>
          </div>

          <div class="score-bar-wrap">
            <div class="score-bar-bg">
              <div class="score-bar-fill" style="width:0%;background:${barColor}" data-width="${score}"></div>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-item"><label>Email</label><span>${r.email || '–'}</span></div>
            <div class="info-item"><label>Phone</label><span>${r.phone || '–'}</span></div>
            <div class="info-item"><label>Experience</label><span>${r.experience_years ?? '?'} yrs</span></div>
            <div class="info-item"><label>Education</label><span>${r.education || '–'}</span></div>
          </div>

          ${skillTags ? `<div class="section-label">Skills Detected</div><div class="tags">${skillTags}</div>` : ''}
          ${strengthTags ? `<div class="section-label" style="margin-top:.5rem">Strengths</div><div class="tags">${strengthTags}</div>` : ''}
          ${gapTags ? `<div class="section-label" style="margin-top:.5rem">Gaps</div><div class="tags">${gapTags}</div>` : ''}

          <div class="match-reason">💬 ${r.match_reason || 'No summary available.'}</div>
        </div>`;
    });

    container.innerHTML = html;

    // Animate score bars
    requestAnimationFrame(() => {
      document.querySelectorAll('.score-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    });
  }

  // ── Toast ───────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
  }
</script>
</body>
</html>
